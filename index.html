<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- installed-app mode: Add to Home Screen plays edge-to-edge with no
         Safari bars (iOS offers no other way to hide them) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sunrise Farm" />
    <meta name="theme-color" content="#87b86a" />
    <!-- relative href: public/ files aren't rewritten by Vite, and the live
         site sits under a /<repo>/ subpath on GitHub Pages -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Sunrise Farm</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87b86a;
        height: 100%;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      }
      canvas {
        /* pinned to the visual viewport: even if a resize event is missed
           (iOS standalone settles late), the canvas can never fall short and
           show the page background as a bar */
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        /* dynamic-viewport units track iOS rotation/toolbar changes even when
           the layout viewport lags (older browsers ignore these two lines) */
        width: 100dvw;
        height: 100dvh;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
